<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dwinity Tax — Verifiziere Login</title>
<link rel="icon" type="image/png" sizes="32x32" href="/img/dwinity-tx-32.png" />
<link rel="icon" type="image/png" sizes="64x64" href="/img/dwinity-tx-256.png" />
<link rel="apple-touch-icon" href="/img/dwinity-tx-256.png" />
<meta name="robots" content="noindex,nofollow" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/theme.css" />
</head>
<body>

<main style="min-height:100vh;display:grid;place-items:center;padding:32px;">
  <div style="text-align:center;max-width:420px;">
    <div id="loading">
      <img src="/img/dwinity-tx-256.png" alt="" class="logo-pulse" style="width:96px;height:96px;margin-bottom:28px;" />
      <div class="spinner" style="margin:0 auto 20px;"></div>
      <p class="font-mono text-cyan" style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;">Verifying signature</p>
      <p class="text-muted" style="font-size:13px;margin-top:10px;">Authenticating your magic link…</p>
    </div>
    <div id="error" class="hidden">
      <div style="font-size:64px;margin-bottom:16px;">⚠</div>
      <h1 class="font-display" style="font-size:28px;font-weight:600;margin-bottom:12px;">Login fehlgeschlagen</h1>
      <p id="error-msg" class="text-muted" style="font-size:14px;margin-bottom:28px;"></p>
      <a href="/" class="btn btn-primary">Erneut anmelden →</a>
    </div>
  </div>
</main>

<script>
  (async () => {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const loading = document.getElementById('loading');
    const errorBox = document.getElementById('error');
    const errorMsg = document.getElementById('error-msg');
    if (!token) {
      loading.classList.add('hidden');
      errorMsg.textContent = 'Kein Token in der URL.';
      errorBox.classList.remove('hidden');
      return;
    }
    try {
      const r = await fetch('/api/auth/verify?token=' + encodeURIComponent(token), { credentials: 'include' });
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        throw new Error(d.detail || ('HTTP ' + r.status));
      }
      window.location.replace('/dashboard');
    } catch (ex) {
      loading.classList.add('hidden');
      errorMsg.textContent = ex.message || String(ex);
      errorBox.classList.remove('hidden');
    }
  })();
</script>
</body>
</html>
